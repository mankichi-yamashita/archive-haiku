<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<title>Wikipedia俳句ジェネレーター</title>

<style>

body{
font-family:sans-serif;
background:#f5f5f5;
text-align:center;
padding:40px;
}

h1{
font-size:32px;
}

input{
padding:10px;
font-size:18px;
width:200px;
}

button{
padding:10px 20px;
font-size:18px;
margin-left:10px;
}

.haiku{

background:white;
margin:20px auto;
padding:20px;
width:300px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
font-size:22px;
line-height:1.8;
}

.score{

color:#888;
font-size:14px;
}

.error{

color:red;
margin-top:20px;

}

</style>

</head>

<body>

<h1>Wikipedia俳句ジェネレーター</h1>

<form method="POST">

<input
type="text"
name="keyword"
placeholder="例：富士山"
value="{{keyword}}"
required
>

<button type="submit">生成</button>

</form>


{% if error %}

<div class="error">

{{error}}

</div>

{% endif %}


{% for haiku,score in results %}

<div class="haiku">

{{haiku|replace("\n","<br>")|safe}}

<div class="score">

AI俳句スコア {{score}}点

</div>

</div>

{% endfor %}

</body>
</html>
