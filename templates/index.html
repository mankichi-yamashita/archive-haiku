<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Wikipedia俳句</title>

<style>

body{
background:#111;
color:white;
font-family:serif;
text-align:center;
margin:0;
padding:20px;
}

h1{
font-weight:300;
margin-bottom:20px;
}

input{
padding:12px;
font-size:18px;
width:70%;
border:none;
border-radius:8px;
}

button{
padding:12px 20px;
font-size:18px;
margin-left:10px;
border:none;
background:#ff3366;
color:white;
border-radius:8px;
}

.haiku{

writing-mode:vertical-rl;
font-size:28px;
margin:40px auto;
line-height:1.8;
background:#222;
padding:30px;
border-radius:10px;
width:120px;
}

.score{

font-size:14px;
color:#aaa;
margin-top:10px;

}

.card{

display:inline-block;
margin:20px;
}

.error{

color:#ff7777;
margin-top:20px;

}

</style>

</head>


<body>

<h1>Wikipedia俳句生成</h1>

<form method="POST">

<input name="keyword" placeholder="例：葛飾北斎" value="{{keyword}}">
<button>生成</button>

</form>

{% if error %}

<div class="error">{{error}}</div>

{% endif %}


{% for haiku,score in results %}

<div class="card">

<div class="haiku">

{{haiku.replace("\n","<br>") | safe}}

</div>

<div class="score">

俳句らしさ {{score}}%

</div>

<a href="https://twitter.com/intent/tweet?text={{haiku}}" target="_blank">

Xで共有

</a>

</div>

{% endfor %}


</body>
</html>
